<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyToDo">
<link rel="apple-touch-icon" href="icon.png">
<title>ToDo App Professional</title>
<style>
:root { --section-opacity: 0.85; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { font-family: -apple-system, sans-serif; overscroll-behavior-y: none; background: #000; color: #1a1a1a; }

/* 背景 */
#bg-layer { position: fixed; inset: 0; background: linear-gradient(135deg,#fde8f0,#fbc8d8); background-size: cover; background-position: center; z-index: -1; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); z-index: 0; pointer-events: none; }

/* コンテナ */
.app-container { 
  position: relative; z-index: 1; max-width: 500px; margin: 0 auto; height: 100vh; overflow-y: auto;
  padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 20px);
  display: flex; flex-direction: column; gap: 10px;
}

.card { 
  background: rgba(255,255,255, var(--section-opacity)); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

/* ヘッダー・カレンダー */
.header { padding: 12px; display: flex; align-items: center; justify-content: space-between; }
.date-wrap { position: relative; flex: 1; text-align: center; }
.date-label { font-size: 16px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
.date-label::after { content: '▼'; font-size: 9px; color: #888; }
#date-picker { position: absolute; inset: 0; opacity: 0; width: 100%; cursor: pointer; }
.nav-btn { background: rgba(0,0,0,0.05); border: none; border-radius: 10px; width: 40px; height: 35px; font-size: 18px; }

/* セクションタイトル */
.card-title { font-size: 11px; font-weight: 800; color: #666; padding: 12px 15px 5px; text-transform: uppercase; letter-spacing: 1px; }

/* タスク一覧 */
.task-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
.task-item:last-child { border: none; }
.cb { width: 22px; height: 22px; accent-color: #4a90e2; }
.task-text { flex: 1; font-size: 15px; transition: 0.2s; }
.task-text.done { text-decoration: line-through; color: #aaa; }
.del-btn { background: none; border: none; color: #ccc; font-size: 20px; padding: 0 5px; }

/* 入力欄 */
.add-area { display: flex; gap: 8px; padding: 10px 15px; }
.add-area input { flex: 1; background: rgba(255,255,255,0.5); border: none; border-radius: 10px; padding: 10px; font-size: 15px; outline: none; }
.add-area button { background: #4a90e2; color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: 700; }

/* 振り返り */
.reflection-box { width: 100%; height: 80px; background: rgba(255,255,255,0.4); border: none; border-radius: 12px; padding: 10px; font-size: 14px; margin: 8px 15px 15px; width: calc(100% - 30px); outline: none; resize: none; }

/* 設定パネル */
.settings-grid { padding: 15px; display: grid; gap: 15px; }
.label { font-size: 11px; font-weight: 800; color: #777; margin-bottom: 5px; display: block; }
.color-list { display: flex; flex-wrap: wrap; gap: 8px; }
.swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; background-size: cover; }
.swatch.active { border-color: #4a90e2; transform: scale(1.1); }

/* 虹色・アップロード */
.rainbow { background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); position: relative; }
.rainbow input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-btn { border: 1.5px dashed #aaa; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #aaa; }

/* 写真調整 */
#adjust-panel { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); display: none; }
.range-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #666; margin-bottom: 5px; }
.range-row input { flex: 1; accent-color: #4a90e2; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div class="overlay"></div>

<div class="app-container">
  <div class="card header">
    <button class="nav-btn" onclick="moveDate(-1)">←</button>
    <div class="date-wrap">
      <div class="date-label" id="date-label">日付</div>
      <input type="date" id="date-picker" onchange="jumpDate(this.value)">
    </div>
    <button class="nav-btn" onclick="moveDate(1)">→</button>
  </div>

  <div class="card">
    <div class="card-title">今日やること</div>
    <div id="today-list"></div>
    <div class="add-area">
      <input type="text" id="today-input" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('today')">
      <button onclick="addTask('today')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今週やること</div>
    <div id="weekly-list"></div>
    <div class="add-area">
      <input type="text" id="weekly-input" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('weekly')">
      <button onclick="addTask('weekly')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日の振り返り</div>
    <textarea id="reflection" class="reflection-box" placeholder="メモや日記に..."></textarea>
  </div>

  <div class="card settings-grid">
    <div>
      <span class="label">背景カラー</span>
      <div class="color-list" id="swatch-list">
        </div>
    </div>
    
    <div id="adjust-panel">
      <span class="label">写真の位置を調整</span>
      <div class="range-row"><span>拡大</span><input type="range" min="100" max="300" id="bg-size" oninput="applyAdjust()"></div>
      <div class="range-row"><span>上下</span><input type="range" min="0" max="100" id="bg-pos" oninput="applyAdjust()"></div>
    </div>

    <div>
      <span class="label">透明度</span>
      <div class="color-list" id="opacity-list">
        <button onclick="setOp(0.3)" style="padding:5px 10px; border-radius:8px; border:none; font-size:11px;">高め</button>
        <button onclick="setOp(0.6)" style="padding:5px 10px; border-radius:8px; border:none; font-size:11px;">中</button>
        <button onclick="setOp(0.85)" style="padding:5px 10px; border-radius:8px; border:none; font-size:11px;">低め</button>
      </div>
    </div>
  </div>
</div>

<script>
let current = new Date();
const storageKey = 'todo_master_v3';
let data = JSON.parse(localStorage.getItem(storageKey)) || { tasks: [], settings: { bg: '', bgType: 'css', size: 100, pos: 50, op: 0.85 } };

// 初期背景9色
const presets = [
  'linear-gradient(135deg,#fde8f0,#fbc8d8)', 'linear-gradient(135deg,#fef9c3,#fde68a)', 
  'linear-gradient(135deg,#d1fae5,#a7f3d0)', 'linear-gradient(135deg,#dbeafe,#bfdbfe)',
  'linear-gradient(135deg,#ede9fe,#ddd6fe)', 'linear-gradient(135deg,#ffedd5,#fdba74)',
  'linear-gradient(135deg,#f3f4f6,#e5e7eb)', 'linear-gradient(135deg,#2c2c2c,#1a1a1a)',
  'linear-gradient(135deg,#0f172a,#1e293b)'
];

function save() { localStorage.setItem(storageKey, JSON.stringify(data)); }
function getDStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function render() {
  const dStr = getDStr(current);
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent = `${current.getMonth()+1}月${current.getDate()}日(${days[current.getDay()]})`;
  document.getElementById('date-picker').value = dStr;
  
  // 反映
  document.getElementById('reflection').value = localStorage.getItem('refl_'+dStr) || '';
  renderList('today', dStr);
  renderList('weekly', dStr);
  applySettings();
}

function renderList(type, dStr) {
  const list = document.getElementById(type + '-list');
  list.innerHTML = '';
  data.tasks.filter(t => t.type === type).forEach(t => {
    // 今日分 or 未完了
    if(type === 'today' && t.date !== dStr) return;
    if(type === 'weekly' && t.done) return;

    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <input type="checkbox" class="cb" ${t.done?'checked':''}>
      <span class="task-text ${t.done?'done':''}">${t.text}</span>
      <button class="del-btn">×</button>
    `;
    div.querySelector('.cb').onchange = (e) => { t.done = e.target.checked; save(); render(); };
    div.querySelector('.del-btn').onclick = () => { data.tasks = data.tasks.filter(x => x !== t); save(); render(); };
    list.appendChild(div);
  });
}

function addTask(type) {
  const input = document.getElementById(type + '-input');
  if(!input.value.trim()) return;
  data.tasks.push({ text: input.value, type, done: false, date: getDStr(current) });
  input.value = ''; save(); render();
}

function moveDate(n) { current.setDate(current.getDate() + n); render(); }
function jumpDate(v) { if(!v) return; current = new Date(v); render(); }

// 設定関連
function applySettings() {
  const bg = document.getElementById('bg-layer');
  const s = data.settings;
  if(s.bgType === 'image') {
    bg.style.backgroundImage = `url(${s.bg})`;
    bg.style.backgroundSize = `${s.size}%`;
    bg.style.backgroundPosition = `center ${s.pos}%`;
    document.getElementById('adjust-panel').style.display = 'block';
    document.getElementById('bg-size').value = s.size;
    document.getElementById('bg-pos').value = s.pos;
  } else {
    bg.style.background = s.bg || presets[0];
    document.getElementById('adjust-panel').style.display = 'none';
  }
  document.documentElement.style.setProperty('--section-opacity', s.op);
}

function setBg(bg, type) { data.settings.bg = bg; data.settings.bgType = type; save(); applySettings(); buildSwatches(); }
function setOp(v) { data.settings.op = v; save(); applySettings(); }
function applyAdjust() { 
  data.settings.size = document.getElementById('bg-size').value; 
  data.settings.pos = document.getElementById('bg-pos').value; 
  save(); applySettings(); 
}

function upload(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => { setBg(ev.target.result, 'image'); };
  reader.readAsDataURL(file);
}

function buildSwatches() {
  const list = document.getElementById('swatch-list');
  list.innerHTML = '';
  presets.forEach(p => {
    const div = document.createElement('div');
    div.className = 'swatch' + (data.settings.bg === p ? ' active' : '');
    div.style.background = p;
    div.onclick = () => setBg(p, 'css');
    list.appendChild(div);
  });
  // 虹色
  const rain = document.createElement('div');
  rain.className = 'swatch rainbow';
  rain.innerHTML = `<input type="color" oninput="setBg(this.value, 'css')">`;
  list.appendChild(rain);
  // アップロード
  const up = document.createElement('label');
  up.className = 'swatch upload-btn';
  up.innerHTML = `＋<input type="file" style="display:none" onchange="upload(event)">`;
  list.appendChild(up);
}

document.getElementById('reflection').oninput = (e) => { localStorage.setItem('refl_'+getDStr(current), e.target.value); };

// 起動
buildSwatches();
render();
</script>
</body>
</html>
