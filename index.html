<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyToDo">
<title>ToDo v26</title>
<style>
:root { 
  --section-opacity: 0.95; 
  --accent-color: #4a90e2; 
  --app-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { font-family: var(--app-font); background: #000; color: #1a1a1a; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

#bg-layer { position: fixed; inset: -20px; background: linear-gradient(135deg,#fde8f0,#fbc8d8); background-size: cover; z-index: -1; filter: blur(var(--bg-blur, 0px)); transition: 0.3s; }

.app-container { 
  position: relative; z-index: 1; max-width: 500px; margin: 0 auto; 
  padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 30px);
  display: flex; flex-direction: column; gap: 10px;
}

.card { background: rgba(255,255,255, var(--section-opacity)); border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); }

.header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
.streak-badge { font-size: 14px; font-weight: 800; color: #ff6b6b; background: rgba(255,107,107,0.1); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 4px;}

.date-nav { display: flex; align-items: center; gap: 5px; }
.date-btn { background: none; border: none; font-size: 20px; padding: 10px; color: #555; cursor: pointer; }
.date-label { font-size: 15px; font-weight: 800; background: rgba(0,0,0,0.03); padding: 8px 15px; border-radius: 20px; position: relative; }
#date-picker { position: absolute; inset: 0; opacity: 0; width: 100%; cursor: pointer; }

.card-title { font-size: 11px; font-weight: 800; color: #666; padding: 12px 15px 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }

/* タスク項目 */
.task-item { display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.03); animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.cb { width: 24px; height: 24px; accent-color: var(--accent-color); flex-shrink: 0; }
.task-content { flex: 1; min-width: 0; }
.task-text { font-size: 16px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-text.done { text-decoration: line-through; color: #aaa; }
.task-meta { display: flex; gap: 4px; margin-top: 2px; }
.badge { font-size: 9px; font-weight: bold; color: #fff; background: #999; padding: 2px 5px; border-radius: 4px; }
.badge.routine { background: var(--accent-color); }
.badge.weekly { background: #8e44ad; } /* 毎週用の紫バッジ */

/* 操作ボタン */
.order-btns { display: flex; flex-direction: column; gap: 2px; }
.order-btn { background: none; border: none; font-size: 12px; color: #ccc; padding: 2px 5px; }
.del-btn { background: none; border: none; color: #ddd; font-size: 20px; padding: 5px; }

/* 入力エリア */
.add-area { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.add-row { display: flex; gap: 6px; }
.add-input { flex: 1; background: rgba(0,0,0,0.05); border: none; border-radius: 10px; padding: 12px; font-size: 15px; outline: none; }
.add-btn { background: var(--accent-color); color: white; border: none; border-radius: 10px; padding: 0 18px; font-weight: 700; }
.opt-row { display: flex; gap: 5px; }
.opt-box { flex: 1; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 5px 8px; display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
.opt-box select, .opt-box input { background: transparent; border: none; font-size: 12px; color: inherit; width: 100%; outline: none; }

.reflection-box { width: calc(100% - 30px); height: 80px; background: rgba(255,255,255,0.3); border: none; border-radius: 12px; padding: 12px; font-size: 15px; margin: 5px 15px 15px; outline: none; resize: none; font-family: inherit; }

#toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: var(--accent-color); color: #fff; padding: 12px 25px; border-radius: 25px; font-size: 14px; font-weight: 800; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
#toast.show { opacity: 1; bottom: 70px; }

.settings-grid { padding: 15px; display: grid; gap: 15px; }
.color-list { display: flex; gap: 10px; }
.swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.swatch.active { border-color: var(--accent-color); transform: scale(1.1); }
</style>
</head>
<body>

<div id="bg-layer"></div>

<div class="app-container">
  <div class="card header">
    <div class="date-nav">
      <button class="date-btn" onclick="moveDate(-1)">◀︎</button>
      <div class="date-label">
        <span id="date-display">日付</span>
        <input type="date" id="date-picker" onchange="jumpDate(this.value)">
      </div>
      <button class="date-btn" onclick="moveDate(1)">▶︎</button>
    </div>
    <div class="streak-badge">🔥 <span id="streak-count">0</span>日連続</div>
  </div>

  <div class="card">
    <div class="card-title">タスク一覧</div>
    <div id="task-list"></div>
    <div class="add-area">
      <div class="add-row">
        <input type="text" id="input-task" class="add-input" placeholder="新しいタスク..." onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">追加</button>
      </div>
      <div class="opt-row">
        <div class="opt-box"><span>🔁</span>
          <select id="input-routine">
            <option value="none">単発</option>
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option> </select>
        </div>
        <div class="opt-box"><span>📅</span>
          <input type="date" id="input-due">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日のメモ</div>
    <textarea id="reflection" class="reflection-box" placeholder="今日の振り返り..."></textarea>
  </div>

  <div class="card">
    <div class="card-title">テーマ設定</div>
    <div class="settings-grid">
      <div class="color-list" id="swatch-list"></div>
    </div>
  </div>
</div>

<div id="toast">お疲れ様！🔥</div>

<script>
let current = new Date();
const storageKey = 'todo_v26_data'; // キーを更新
const presets = [
  { bg: 'linear-gradient(135deg,#fde8f0,#fbc8d8)', color: '#ec4899' }, 
  { bg: 'linear-gradient(135deg,#dbeafe,#bfdbfe)', color: '#3b82f6' }, 
  { bg: 'linear-gradient(135deg,#ecfccb,#d9f99d)', color: '#84cc16' },
  { bg: 'linear-gradient(135deg,#1a1a1a,#333333)', color: '#999999' }
];

let rawData = localStorage.getItem(storageKey) || localStorage.getItem('todo_v25_data');
let data = rawData ? JSON.parse(rawData) : { tasks: [], settings: { themeIdx: 0 } };

function save() { 
  localStorage.setItem(storageKey, JSON.stringify(data)); 
  render();
}

function getDStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

// 指定した日付が属する週（月曜始まり）の識別文字列を生成する関数
function getWeekStr(dateObj) {
  const d = new Date(dateObj);
  const day = d.getDay();
  // 日曜日は0なので、月曜始まりにするための計算
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
  d.setDate(diff);
  return "W-" + getDStr(d); // 例: "W-2026-04-20"
}

function moveDate(n) { current.setDate(current.getDate() + n); render(); }
function jumpDate(v) { if (v) current = new Date(v.replace(/-/g, '/')); render(); }

function addTask() {
  const input = document.getElementById('input-task');
  const routine = document.getElementById('input-routine').value;
  const due = document.getElementById('input-due').value;
  if (!input.value.trim()) return;

  data.tasks.push({
    id: Date.now(),
    text: input.value.trim(),
    createdAt: getDStr(current),
    completedAt: null,
    completedDates: [],
    routine: routine,
    dueDate: due || null
  });
  input.value = '';
  save();
}

function toggleTask(id) {
  const t = data.tasks.find(x => x.id === id);
  const dStr = getDStr(current);
  const wStr = getWeekStr(current); // 今週の識別子

  if (t.routine === 'daily') {
    if (!t.completedDates.includes(dStr)) {
      t.completedDates.push(dStr); showToast();
    } else {
      t.completedDates = t.completedDates.filter(d => d !== dStr);
    }
  } else if (t.routine === 'weekly') {
    // 毎週の場合は、その週の識別子で判定
    if (!t.completedDates.includes(wStr)) {
      t.completedDates.push(wStr); showToast();
    } else {
      t.completedDates = t.completedDates.filter(d => d !== wStr);
    }
  } else {
    if (!t.completedAt) {
      t.completedAt = dStr; showToast();
    } else {
      t.completedAt = null;
    }
  }
  save();
}

// 並び替え用関数
function moveTask(id, direction) {
  const idx = data.tasks.findIndex(t => t.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= data.tasks.length) return;
  const temp = data.tasks[idx];
  data.tasks[idx] = data.tasks[newIdx];
  data.tasks[newIdx] = temp;
  save();
}

function deleteTask(id) {
  data.tasks = data.tasks.filter(t => t.id !== id);
  save();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function calcStreak() {
  let count = 0;
  let check = new Date();
  const doneDates = new Set();
  
  data.tasks.forEach(t => {
    if (t.completedAt) doneDates.add(t.completedAt);
    if (t.completedDates) t.completedDates.forEach(d => doneDates.add(d));
  });

  let dStr = getDStr(check);
  if (!doneDates.has(dStr)) {
    check.setDate(check.getDate() - 1);
    dStr = getDStr(check);
  }

  while (doneDates.has(dStr)) {
    count++;
    check.setDate(check.getDate() - 1);
    dStr = getDStr(check);
  }
  document.getElementById('streak-count').textContent = count;
}

function render() {
  const dStr = getDStr(current);
  const wStr = getWeekStr(current);
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-display').textContent = `${current.getMonth()+1}/${current.getDate()}(${days[current.getDay()]})`;

  const listEl = document.getElementById('task-list');
  listEl.innerHTML = '';

  const visible = data.tasks.filter(t => {
    if (t.routine === 'daily' || t.routine === 'weekly') return dStr >= t.createdAt;
    if (dStr < t.createdAt) return false;
    if (t.completedAt) return dStr >= t.createdAt && dStr <= t.completedAt;
    return true;
  });

  visible.forEach(t => {
    let isDone = false;
    let badgeHtml = '';

    if (t.routine === 'daily') {
      isDone = t.completedDates.includes(dStr);
      badgeHtml = '<span class="badge routine">🔁毎日</span>';
    } else if (t.routine === 'weekly') {
      isDone = t.completedDates.includes(wStr);
      badgeHtml = '<span class="badge weekly">🔁毎週</span>';
    } else {
      isDone = !!t.completedAt;
      if (t.dueDate) badgeHtml = `<span class="badge">📅${t.dueDate.slice(5)}</span>`;
    }

    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <input type="checkbox" class="cb" ${isDone ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <div class="task-content">
        <span class="task-text ${isDone ? 'done' : ''}">${t.text}</span>
        <div class="task-meta">
          ${badgeHtml}
        </div>
      </div>
      <div class="order-btns">
        <button class="order-btn" onclick="moveTask(${t.id}, -1)">▲</button>
        <button class="order-btn" onclick="moveTask(${t.id}, 1)">▼</button>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
    `;
    listEl.appendChild(div);
  });

  document.getElementById('reflection').value = localStorage.getItem('refl_' + dStr) || '';
  
  const s = presets[data.settings.themeIdx];
  document.getElementById('bg-layer').style.background = s.bg;
  document.documentElement.style.setProperty('--accent-color', s.color);
  
  const sl = document.getElementById('swatch-list');
  sl.innerHTML = '';
  presets.forEach((p, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (data.settings.themeIdx === i ? ' active' : '');
    sw.style.background = p.bg;
    sw.onclick = () => { data.settings.themeIdx = i; save(); };
    sl.appendChild(sw);
  });

  calcStreak();
}

document.getElementById('reflection').oninput = (e) => {
  localStorage.setItem('refl_' + getDStr(current), e.target.value);
};

render();
</script>
</body>
</html>
