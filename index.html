<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyToDo">
<link rel="apple-touch-icon" href="icon.png">
<title>ToDo App v24</title>
<style>
:root { 
  --section-opacity: 0.95; 
  --accent-color: #4a90e2; 
  --app-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --bg-blur: 0px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { font-family: var(--app-font); background: #000; color: #1a1a1a; transition: font-family 0.3s; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

#bg-layer { position: fixed; inset: -20px; background: linear-gradient(135deg,#fde8f0,#fbc8d8); background-size: cover; background-position: center; z-index: -1; transition: background 0.3s, filter 0.3s; filter: blur(var(--bg-blur)); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); z-index: 0; pointer-events: none; }

.app-container { 
  position: relative; z-index: 1; max-width: 500px; margin: 0 auto; 
  padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 80px);
  display: flex; flex-direction: column; gap: 10px;
}

.card { 
  background: rgba(255,255,255, var(--section-opacity)); backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
  border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); transition: background 0.3s;
}

.header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; gap:5px; }
.header-btn { border: none; background: none; font-size: 24px; padding: 5px 10px; cursor: pointer; color: #333; }
#streak-badge { font-size: 12px; font-weight: 800; color: #ff6b6b; background: rgba(255,107,107,0.1); padding: 5px 10px; border-radius: 15px; display: flex; align-items: center; gap: 4px;}

.date-nav-btn { background: none; border: none; font-size: 20px; padding: 12px; color: #555; cursor: pointer; transition: 0.2s; }
.date-wrap { position: relative; margin: 0; }
.date-label { font-size: 15px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); padding: 8px 15px; border-radius: 20px; white-space: nowrap; }
#date-picker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

.card-title { font-size: 11px; font-weight: 800; color: #666; padding: 12px 15px 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between;}

.task-item { display: flex; align-items: center; gap: 8px; padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.03); background: transparent; cursor: grab; }
.task-item:active { cursor: grabbing; }
.drag-handle { color: #ccc; font-size: 18px; padding-right: 5px; cursor: grab; }
.cb { width: 22px; height: 22px; accent-color: var(--accent-color); transition: 0.3s; flex-shrink: 0; }
.task-content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
.task-text { font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-text.done { text-decoration: line-through; color: #aaa; }
.task-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.badge { font-size: 9px; font-weight: bold; color: #fff; background: #ff6b6b; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
.badge.routine { background: var(--accent-color); }
.badge.time { background: #8e44ad; }
.edit-btn, .del-btn { background: none; border: none; padding: 5px; flex-shrink: 0; cursor: pointer; }
.edit-btn { color: #999; font-size: 16px; }
.del-btn { color: #ccc; font-size: 20px; }

#toast { 
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
  background: var(--accent-color); color: #fff; 
  padding: 12px 24px; border-radius: 25px; font-size: 14px; font-weight: 800; 
  opacity: 0; transition: 0.3s; z-index: 5000; pointer-events: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
#toast.show { opacity: 1; bottom: 120px; }

.add-area { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; }
.add-row { display: flex; gap: 6px; align-items: center; }
.add-area input[type="text"] { flex: 1; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; }
.opt-wrap { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 0 8px; height: 38px; font-size: 12px; color: #666; gap: 5px; flex:1;}
.opt-wrap input, .opt-wrap select { background: transparent; border: none; outline: none; font-size: 12px; color: inherit; width: 100%;}
.add-btn { background: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 0 15px; height: 38px; font-weight: 700; cursor: pointer; font-size: 13px; white-space: nowrap; }

.reflection-box { width: calc(100% - 30px); height: 80px; background: rgba(255,255,255,0.3); border: none; border-radius: 12px; padding: 10px; font-size: 14px; margin: 8px 15px 15px; outline: none; resize: none; font-family: inherit; }

.settings-card { overflow: hidden; }
.settings-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 800; font-size: 14px; color: #555; }
.settings-grid { padding: 0 15px 15px 15px; display: grid; gap: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
.label { font-size: 11px; font-weight: 800; color: #777; margin-bottom: 8px; display: block; }
.color-list { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; background-size: cover; position: relative; transition: 0.2s; }
.swatch.active { border-color: var(--accent-color); transform: scale(1.1); }
.op-btn-group { display: flex; gap: 10px; }
.op-btn { flex: 1; height: 40px; border-radius: 10px; border: none; background: rgba(0,0,0,0.05); font-weight: 700; font-size: 13px; color: #444; transition: 0.3s; font-family: inherit; cursor: pointer; }
.op-btn.active { background: var(--accent-color); color: white; }

/* Archive Modal styles simplified for brevity */
#archive-modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
#archive-modal.show { display: flex !important; }
.archive-card { background: #fff; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
.archive-header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
#archive-list { overflow-y: auto; flex: 1; padding: 20px; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div class="overlay"></div>

<div class="app-container">
  <div class="card header">
    <button class="header-btn" onclick="openArchive()">≡</button>
    <div style="display:flex; align-items:center; gap:5px;">
      <button class="date-nav-btn" onclick="moveDate(-1)">◀︎</button>
      <div class="date-wrap">
        <div class="date-label" id="date-label">日付</div>
        <input type="date" id="date-picker" onchange="jumpDate(this.value)">
      </div>
      <button class="date-nav-btn" onclick="moveDate(1)">▶︎</button>
    </div>
    <div id="streak-badge">🔥 <span id="streak-count">0</span>日</div>
  </div>

  <div class="card">
    <div class="card-title">今日やること</div>
    <div id="list-today"></div>
    <div class="add-area">
      <div class="add-row">
        <input type="text" id="input-today" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('today')">
        <button class="add-btn" onclick="addTask('today')">追加</button>
      </div>
      <div class="add-row">
        <div class="opt-wrap"><span style="white-space:nowrap">🔁</span>
          <select id="routine-today"><option value="none">単発</option><option value="daily">毎日</option></select>
        </div>
        <div class="opt-wrap"><span style="white-space:nowrap">📅</span>
          <input type="date" id="due-today">
        </div>
        <div class="opt-wrap"><span style="white-space:nowrap">⏰</span>
          <input type="time" id="time-today">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今週やること</div>
    <div id="list-weekly"></div>
    <div class="add-area">
      <div class="add-row">
        <input type="text" id="input-weekly" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('weekly')">
        <button class="add-btn" onclick="addTask('weekly')">追加</button>
      </div>
      <div class="add-row">
        <div class="opt-wrap"><span style="white-space:nowrap">🔁</span>
          <select id="routine-weekly"><option value="none">単発</option><option value="daily">毎日</option></select>
        </div>
        <div class="opt-wrap"><span style="white-space:nowrap">📅</span>
          <input type="date" id="due-weekly">
        </div>
        <div class="opt-wrap"><span style="white-space:nowrap">⏰</span>
          <input type="time" id="time-weekly">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日のメモ</div>
    <textarea id="reflection" class="reflection-box" placeholder="今日はどんな一日だった？"></textarea>
  </div>

  <div class="card settings-card">
    <div class="settings-header" onclick="toggleSettings()">
      <span>⚙️ 詳細設定</span><span id="settings-chevron">▼</span>
    </div>
    <div class="settings-grid" id="settings-content" style="display: none;">
      <div>
        <span class="label">通知設定</span>
        <button class="op-btn" style="width:100%" onclick="requestNotification()">ブラウザ通知を許可する</button>
      </div>
      <div><span class="label">背景</span><div class="color-list" id="swatch-list"></div></div>
      <div><span class="label">ぼかし</span>
        <div class="op-btn-group"><button id="blur-none" class="op-btn" onclick="setBlur('0px')">なし</button><button id="blur-mid" class="op-btn" onclick="setBlur('5px')">弱</button><button id="blur-high" class="op-btn" onclick="setBlur('15px')">強</button></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="archive-modal">
  <div class="archive-card">
    <div class="archive-header"><h3>過去の完了タスク</h3><button class="header-btn" onclick="closeArchive()">×</button></div>
    <div id="archive-list"></div>
  </div>
</div>

<script>
let current = new Date();
const storageKey = 'todo_app_permanent_data_v2'; // データ構造変更のためキー更新(データは引き継ぐ設定)

const presets = [
  { bg: 'linear-gradient(135deg,#fde8f0,#fbc8d8)', color: '#ec4899' }, 
  { bg: 'linear-gradient(135deg,#dbeafe,#bfdbfe)', color: '#3b82f6' }, 
  { bg: 'linear-gradient(135deg,#ecfccb,#d9f99d)', color: '#84cc16' }, 
];

let rawData = localStorage.getItem(storageKey) || localStorage.getItem('todo_app_permanent_data');
let data = rawData ? JSON.parse(rawData) : { tasks: [], uploads: [], settings: {} };

if(!data.settings.bg) data.settings = { bg: presets[0].bg, bgType: 'css', themeColor: presets[0].color, op: 0.95, blur: '0px' };

function save() { localStorage.setItem(storageKey, JSON.stringify(data)); calcStreak(); }
function getDStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function showToast() {
  const t = document.getElementById('toast');
  t.textContent = "お疲れ様！🔥"; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 連続達成日数の計算
function calcStreak() {
  let count = 0;
  let tempD = new Date();
  let todayStr = getDStr(tempD);
  tempD.setDate(tempD.getDate() - 1);
  let yesterdayStr = getDStr(tempD);

  let doneDates = new Set();
  data.tasks.forEach(t => {
    if(t.completedAt) doneDates.add(t.completedAt.includes('T') ? getDStr(new Date(t.completedAt)) : t.completedAt);
    if(t.completedDates) t.completedDates.forEach(cd => doneDates.add(cd));
  });

  let currentCheck = todayStr;
  if (doneDates.has(todayStr)) { count++; currentCheck = yesterdayStr; } 
  else if (doneDates.has(yesterdayStr)) { currentCheck = yesterdayStr; } 
  else { document.getElementById('streak-count').textContent = "0"; return; }

  while(true) {
    if (currentCheck !== todayStr && doneDates.has(currentCheck)) { count++; } 
    else if (currentCheck !== todayStr) { break; }
    let prev = new Date(currentCheck.replace(/-/g, '/'));
    prev.setDate(prev.getDate() - 1);
    currentCheck = getDStr(prev);
  }
  document.getElementById('streak-count').textContent = count;
}

let draggedTask = null;

function render() {
  const dStr = getDStr(current);
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent = `${current.getFullYear()}年${current.getMonth()+1}月${current.getDate()}日(${days[current.getDay()]})`;

  ['today', 'weekly'].forEach(type => {
    const listEl = document.getElementById('list-' + type);
    listEl.innerHTML = '';
    
    const visible = data.tasks.filter(t => {
      if (t.type !== type) return false;
      // ルーチンが毎日の場合、作成日以降なら常に表示
      if (t.routine === 'daily') return dStr >= t.createdAt;
      
      // 単発タスクの表示ロジック（追加日〜完了日まで車線を引くための期間表示）
      if (dStr < t.createdAt) return false; 
      if (t.completedAt) {
        const compDate = t.completedAt.includes('T') ? getDStr(new Date(t.completedAt)) : t.completedAt;
        return dStr >= t.createdAt && dStr <= compDate;
      }
      return dStr >= t.createdAt;
    });

    visible.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.draggable = true; // Drag & Drop API

      // ドラッグ＆ドロップのイベント
      div.ondragstart = (e) => { draggedTask = t; div.style.opacity = '0.4'; e.dataTransfer.effectAllowed = 'move'; };
      div.ondragend = () => { div.style.opacity = '1'; draggedTask = null; };
      div.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
      div.ondrop = (e) => {
        e.preventDefault();
        if (!draggedTask || draggedTask === t) return;
        const fromIdx = data.tasks.indexOf(draggedTask);
        const toIdx = data.tasks.indexOf(t);
        data.tasks.splice(fromIdx, 1);
        data.tasks.splice(toIdx, 0, draggedTask);
        save(); render();
      };

      const handle = document.createElement('span'); handle.className = 'drag-handle'; handle.innerHTML = '≡';
      
      // ルーチンの場合は日別で完了判定、単発の場合は全体の完了日が存在するか判定
      const isDone = t.routine === 'daily' ? (t.completedDates && t.completedDates.includes(dStr)) : !!t.completedAt;
      
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'cb'; cb.checked = isDone;
      cb.onchange = () => {
        if (cb.checked) { 
          if(t.routine === 'daily') {
            if(!t.completedDates) t.completedDates = [];
            if(!t.completedDates.includes(dStr)) t.completedDates.push(dStr);
          } else {
            t.completedAt = getDStr(current); 
          }
          showToast(); 
        } else { 
          if(t.routine === 'daily') {
            t.completedDates = t.completedDates.filter(d => d !== dStr);
          } else {
            t.completedAt = null; 
          }
        }
        save(); render();
      };

      const contentDiv = document.createElement('div'); contentDiv.className = 'task-content';
      
      const textSpan = document.createElement('span'); textSpan.className = 'task-text' + (isDone ? ' done' : '');
      textSpan.textContent = t.text;
      
      const metaDiv = document.createElement('div'); metaDiv.className = 'task-meta';
      if(t.routine === 'daily') { metaDiv.innerHTML += `<span class="badge routine">🔁 毎日</span>`; }
      if(t.dueDate) { metaDiv.innerHTML += `<span class="badge">期限: ${t.dueDate.replace(/-/g, '/')}</span>`; }
      if(t.notifyTime) { metaDiv.innerHTML += `<span class="badge time">⏰ ${t.notifyTime}</span>`; }
      
      contentDiv.appendChild(textSpan);
      if(metaDiv.innerHTML) contentDiv.appendChild(metaDiv);

      const del = document.createElement('button'); del.className = 'del-btn'; del.innerHTML = '×';
      del.onclick = () => { data.tasks = data.tasks.filter(x => x !== t); save(); render(); };
      
      div.appendChild(handle); div.appendChild(cb); div.appendChild(contentDiv); div.appendChild(del); 
      listEl.appendChild(div);
    });
  });
  document.getElementById('reflection').value = localStorage.getItem('refl_' + dStr) || '';
  applySettings(); buildSwatches(); calcStreak();
}

function addTask(type) {
  const input = document.getElementById('input-' + type);
  const dueInput = document.getElementById('due-' + type);
  const timeInput = document.getElementById('time-' + type);
  const routineInput = document.getElementById('routine-' + type);
  if (!input.value.trim()) return;
  
  data.tasks.push({ 
    text: input.value.trim(), type: type, createdAt: getDStr(current), completedAt: null, completedDates: [],
    dueDate: dueInput.value || null, routine: routineInput.value, notifyTime: timeInput.value || null, notified: false
  });
  
  input.value = ''; dueInput.value = ''; timeInput.value = ''; save(); render();
}

function moveDate(n) { current.setDate(current.getDate() + n); render(); }
function jumpDate(v) { if (v) current = new Date(v.replace(/-/g, '/')); render(); }
function toggleSettings() { const c = document.getElementById('settings-content'); c.style.display = c.style.display === 'none' ? 'grid' : 'none'; }
function openArchive() { document.getElementById('archive-modal').classList.add('show'); }
function closeArchive() { document.getElementById('archive-modal').classList.remove('show'); }

function applySettings() {
  const bg = document.getElementById('bg-layer'); const s = data.settings;
  bg.style.background = s.bg; bg.style.backgroundSize = 'cover'; bg.style.backgroundPosition = 'center';
  document.documentElement.style.setProperty('--accent-color', s.themeColor || '#4a90e2');
  document.documentElement.style.setProperty('--bg-blur', s.blur);
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  if (s.blur === '0px') document.getElementById('blur-none').classList.add('active');
  if (s.blur === '5px') document.getElementById('blur-mid').classList.add('active');
  if (s.blur === '15px') document.getElementById('blur-high').classList.add('active');
}
function setBlur(v) { data.settings.blur = v; save(); render(); }
function setBg(bg, type, color) { data.settings.bg = bg; data.settings.bgType = type; data.settings.themeColor = color; save(); render(); }
function buildSwatches() {
  const list = document.getElementById('swatch-list'); list.innerHTML = '';
  presets.forEach(p => {
    const div = document.createElement('div'); div.className = 'swatch' + (data.settings.bg === p.bg ? ' active' : '');
    div.style.background = p.bg; div.onclick = () => setBg(p.bg, 'css', p.color); list.appendChild(div);
  });
}

document.getElementById('reflection').oninput = (e) => { localStorage.setItem('refl_' + getDStr(current), e.target.value); };

// --- 通知機能ロジック ---
function requestNotification() {
  if (!("Notification" in window)) { alert("お使いのブラウザは通知機能に対応していません。"); return; }
  Notification.requestPermission().then(p => { if (p === "granted") alert("通知が許可されました！"); });
}

setInterval(() => {
  if (Notification.permission !== "granted") return;
  const now = new Date(); const dStr = getDStr(now);
  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  data.tasks.forEach(t => {
    if (t.notifyTime && !t.notified) {
      // 単発なら作成日か期限日、ルーチンなら毎日判定
      let isTargetDay = (t.routine === 'daily') ? true : (t.dueDate === dStr || t.createdAt === dStr);
      if (isTargetDay && t.notifyTime === timeStr) {
        new Notification("MyToDo リマインダー", { body: `「${t.text}」の時間です！` });
        t.notified = true; save();
      }
    }
  });
  // 日付が変わったら通知フラグをリセットする処理
  if(timeStr === "00:00") { data.tasks.forEach(t => t.notified = false); save(); }
}, 60000);

render();
</script>
</body>
</html>
