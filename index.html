<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyToDo">
<link rel="apple-touch-icon" href="icon.png">
<title>ToDo App Ultimate</title>
<style>
:root { --section-opacity: 0.85; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { font-family: -apple-system, sans-serif; overscroll-behavior-y: none; background: #000; color: #1a1a1a; }

/* 背景レイヤー：全画面 */
#bg-layer { position: fixed; inset: 0; background: linear-gradient(135deg,#fde8f0,#fbc8d8); background-size: cover; background-position: center; z-index: -1; transition: background 0.3s; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); z-index: 0; pointer-events: none; }

.app-container { 
  position: relative; z-index: 1; max-width: 500px; margin: 0 auto; height: 100vh; overflow-y: auto;
  padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 20px);
  display: flex; flex-direction: column; gap: 10px;
}

.card { 
  background: rgba(255,255,255, var(--section-opacity)); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); 
}

.header { padding: 10px; display: flex; align-items: center; justify-content: space-between; }
.date-wrap { position: relative; flex: 1; text-align: center; }
.date-label { font-size: 16px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.03); padding: 5px 12px; border-radius: 20px; }
#date-picker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

.card-title { font-size: 11px; font-weight: 800; color: #666; padding: 12px 15px 5px; text-transform: uppercase; letter-spacing: 1px; }

/* タスク項目 */
.task-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
.cb { width: 22px; height: 22px; accent-color: #4a90e2; }
.task-text { flex: 1; font-size: 15px; }
.task-text.done { text-decoration: line-through; color: #aaa; }
.del-btn { background: none; border: none; color: #ccc; font-size: 20px; padding: 5px; }

/* 入力エリア */
.add-area { display: flex; gap: 8px; padding: 10px 15px; }
.add-area input { flex: 1; background: rgba(0,0,0,0.05); border: none; border-radius: 10px; padding: 10px; font-size: 15px; outline: none; }
.add-area button { background: #4a90e2; color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: 700; }

.reflection-box { width: calc(100% - 30px); height: 80px; background: rgba(255,255,255,0.3); border: none; border-radius: 12px; padding: 10px; font-size: 14px; margin: 8px 15px 15px; outline: none; resize: none; }

/* 設定パネル */
.settings-grid { padding: 15px; display: grid; gap: 15px; }
.label { font-size: 11px; font-weight: 800; color: #777; margin-bottom: 8px; display: block; }

.color-list { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; background-size: cover; position: relative; }
.swatch.active { border-color: #4a90e2; transform: scale(1.1); }
.rainbow { background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); }
#custom-picker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

/* 透明度ボタン */
.op-btn-group { display: flex; gap: 10px; }
.op-btn { flex: 1; height: 45px; border-radius: 12px; border: none; background: rgba(0,0,0,0.05); font-weight: 700; font-size: 13px; color: #444; }
.op-btn.active { background: #4a90e2; color: white; }

#img-modal.show { display: flex !important; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div class="overlay"></div>

<div class="app-container">
  <div class="card header">
    <button onclick="moveDate(-1)" style="border:none; background:none; font-size:20px; padding:10px;">←</button>
    <div class="date-wrap">
      <div class="date-label" id="date-label">日付</div>
      <input type="date" id="date-picker" onchange="jumpDate(this.value)">
    </div>
    <button onclick="moveDate(1)" style="border:none; background:none; font-size:20px; padding:10px;">→</button>
  </div>

  <div class="card">
    <div class="card-title">今日やること</div>
    <div id="list-today"></div>
    <div class="add-area">
      <input type="text" id="input-today" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('today')">
      <button onclick="addTask('today')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今週やること</div>
    <div id="list-weekly"></div>
    <div class="add-area">
      <input type="text" id="input-weekly" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('weekly')">
      <button onclick="addTask('weekly')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日のメモ</div>
    <textarea id="reflection" class="reflection-box" placeholder="今日はどんな一日だった？"></textarea>
  </div>

  <div class="card settings-grid">
    <div>
      <span class="label">背景を選ぶ</span>
      <div class="color-list" id="swatch-list"></div>
      <div class="color-list" id="history-list" style="margin-top:10px;"></div>
    </div>

    <div id="adjust-panel" style="display:none;"></div>

    <div>
      <span class="label">パネルの透明度</span>
      <div class="op-btn-group">
        <button id="op-high" class="op-btn" onclick="setOp(0.3)">高い</button>
        <button id="op-mid" class="op-btn" onclick="setOp(0.6)">中</button>
        <button id="op-low" class="op-btn" onclick="setOp(0.85)">低い</button>
      </div>
    </div>
  </div>
</div>

<div id="img-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div id="img-preview-wrap" style="width:300px;height:300px;overflow:hidden;border-radius:16px;position:relative;background:#111;">
    <img id="img-preview" src="" alt="" style="position:absolute;width:100%;height:auto;left:0;top:0;transform-origin:center top;">
  </div>
  <div style="width:300px;display:grid;gap:10px;">
    <div style="display:flex;align-items:center;gap:10px;color:#fff;font-size:12px;"><span style="width:32px">拡大</span><input type="range" id="adj-size" min="100" max="300" value="100" oninput="updatePreview()" style="flex:1;accent-color:#4a90e2;"></div>
    <div style="display:flex;align-items:center;gap:10px;color:#fff;font-size:12px;"><span style="width:32px">上下</span><input type="range" id="adj-pos" min="0" max="100" value="50" oninput="updatePreview()" style="flex:1;accent-color:#4a90e2;"></div>
  </div>
  <div style="display:flex;gap:10px;width:300px;">
    <button onclick="closeModal()" style="flex:1;padding:12px;border-radius:12px;border:none;font-weight:700;font-size:14px;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;">キャンセル</button>
    <button onclick="confirmImage()" style="flex:1;padding:12px;border-radius:12px;border:none;font-weight:700;font-size:14px;background:#4a90e2;color:#fff;cursor:pointer;">確定</button>
  </div>
</div>

<script>
let current = new Date();
const storageKey = 'todo_final_v8';
const presets = [
  'linear-gradient(135deg,#fde8f0,#fbc8d8)',
  'linear-gradient(135deg,#fef9c3,#fde68a)',
  'linear-gradient(135deg,#d1fae5,#a7f3d0)',
  'linear-gradient(135deg,#dbeafe,#bfdbfe)',
  'linear-gradient(135deg,#ede9fe,#ddd6fe)',
  'linear-gradient(135deg,#ffedd5,#fed7aa)',
  'linear-gradient(135deg,#fce7f3,#fbcfe8)',
  'linear-gradient(135deg,#ecfccb,#d9f99d)',
  'linear-gradient(135deg,#e0f2fe,#bae6fd)',
];

// v7のデータがあれば引き継ぐように設定
let data = JSON.parse(localStorage.getItem(storageKey)) || JSON.parse(localStorage.getItem('todo_final_v7')) || {
  tasks: [],
  uploads: [],
  settings: { bg: presets[0], bgType: 'css', size: 100, pos: 50, op: 0.85 }
};

let pendingImageData = null;

function save() { localStorage.setItem(storageKey, JSON.stringify(data)); }
function getDStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function render() {
  const dStr = getDStr(current);
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent = `${current.getFullYear()}年${current.getMonth()+1}月${current.getDate()}日(${days[current.getDay()]})`;

  ['today', 'weekly'].forEach(type => {
    const listEl = document.getElementById('list-' + type);
    listEl.innerHTML = '';

    const visible = data.tasks.filter(t => {
      if (t.type !== type) return false;
      
      // 古いデータの互換性補正
      if (!t.createdAt) t.createdAt = '2000-01-01'; 
      if (t.completedAt === undefined) {
        if (t.doneDates && t.doneDates.length > 0) {
          t.completedAt = t.doneDates[t.doneDates.length - 1]; // 最後の完了日を反映
        } else {
          t.completedAt = null;
        }
      }

      // 1. タスクを追加した日より前には表示しない
      if (dStr < t.createdAt) return false;

      // 2. 完了している場合
      if (t.completedAt) {
        // 完了した日の翌日以降は完全に消える
        if (dStr > t.completedAt) return false;
        // 追加した日から完了した日までは表示させる
        return true;
      }

      // 未完了なら、追加した日以降ずっと表示させる
      return true;
    });

    visible.forEach(t => {
      const isDone = t.completedAt !== null;

      const div = document.createElement('div');
      div.className = 'task-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'cb';
      cb.checked = isDone;
      cb.addEventListener('change', () => {
        if (cb.checked) {
          t.completedAt = dStr; // 現在表示している日を完了日に設定
        } else {
          t.completedAt = null; // チェックを外すと未完了に戻る
        }
        save();
        render(); // すぐに画面を更新
      });

      const span = document.createElement('span');
      // 完了している場合は車線を引く（追加日〜完了日まで）
      span.className = 'task-text' + (isDone ? ' done' : '');
      span.textContent = t.text;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.onclick = () => { data.tasks = data.tasks.filter(x => x !== t); save(); render(); };

      div.appendChild(cb); div.appendChild(span); div.appendChild(del);
      listEl.appendChild(div);
    });
  });

  document.getElementById('reflection').value = localStorage.getItem('refl_' + dStr) || '';
  applySettings();
  buildSwatches();
}

function addTask(type) {
  const input = document.getElementById('input-' + type);
  if (!input.value.trim()) return;
  // 追加した日（現在カレンダーで表示している日）を記録
  data.tasks.push({ 
    text: input.value.trim(), 
    type: type, 
    createdAt: getDStr(current), 
    completedAt: null 
  });
  input.value = ''; save(); render();
}

function moveDate(n) { current.setDate(current.getDate() + n); render(); }
function jumpDate(v) { if (!v) return; current = new Date(v.replace(/-/g, '/')); render(); }

function applySettings() {
  const bg = document.getElementById('bg-layer');
  const s = data.settings;
  if (s.bgType === 'image') {
    bg.style.backgroundImage = `url(${s.bg})`;
    bg.style.backgroundSize = `${s.size}%`;
    bg.style.backgroundPosition = `center ${s.pos}%`;
    document.getElementById('adjust-panel').style.display = 'none';
  } else {
    // 【バグ修正】ここで backgroundImage = 'none' をしていたのを削除しました
    bg.style.background = s.bg;
    bg.style.backgroundSize = 'cover';
    document.getElementById('adjust-panel').style.display = 'none';
  }
  document.documentElement.style.setProperty('--section-opacity', s.op);
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  if (s.op === 0.3) document.getElementById('op-high').classList.add('active');
  if (s.op === 0.6) document.getElementById('op-mid').classList.add('active');
  if (s.op === 0.85) document.getElementById('op-low').classList.add('active');
}

function setBg(bg, type) {
  data.settings.bg = bg; data.settings.bgType = type;
  save(); render();
}

function setOp(v) { data.settings.op = v; save(); render(); }

function buildSwatches() {
  const list = document.getElementById('swatch-list');
  list.innerHTML = '';
  presets.forEach(p => {
    const div = document.createElement('div');
    div.className = 'swatch' + (data.settings.bg === p && data.settings.bgType === 'css' ? ' active' : '');
    div.style.background = p;
    div.onclick = () => setBg(p, 'css');
    list.appendChild(div);
  });

  // アップロードボタン
  const uploadLabel = document.createElement('label');
  uploadLabel.className = 'swatch';
  uploadLabel.style.border = '1.5px dashed #aaa';
  uploadLabel.innerHTML = `<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:18px">＋</span><input type="file" accept="image/*" style="display:none">`;
  uploadLabel.querySelector('input').addEventListener('change', onFileSelect);
  list.appendChild(uploadLabel);

  // 保存済み画像スウォッチ
  const histList = document.getElementById('history-list');
  histList.innerHTML = '';
  (data.uploads || []).forEach(u => {
    const div = document.createElement('div');
    div.className = 'swatch' + (data.settings.bg === u.data && data.settings.bgType === 'image' ? ' active' : '');
    div.style.backgroundImage = `url(${u.data})`;
    div.style.backgroundSize = `${u.size}%`;
    div.style.backgroundPosition = `center ${u.pos}%`;
    div.onclick = () => { data.settings.size = u.size; data.settings.pos = u.pos; setBg(u.data, 'image'); };
    histList.appendChild(div);
  });
}

// 画像アップロード→モーダル
function onFileSelect(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingImageData = ev.target.result;
    const img = document.getElementById('img-preview');
    img.src = pendingImageData;
    document.getElementById('adj-size').value = 100;
    document.getElementById('adj-pos').value = 50;
    img.onload = updatePreview;
    document.getElementById('img-modal').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function updatePreview() {
  const size = document.getElementById('adj-size').value;
  const pos = document.getElementById('adj-pos').value;
  const img = document.getElementById('img-preview');
  const wrap = document.getElementById('img-preview-wrap');
  const scale = size / 100;
  const imgH = img.naturalHeight * (wrap.offsetWidth / img.naturalWidth) * scale;
  const maxOffset = Math.max(0, imgH - wrap.offsetHeight);
  img.style.transform = `scale(${scale})`;
  img.style.transformOrigin = 'center top';
  img.style.top = `-${(pos / 100) * maxOffset}px`;
  img.style.width = '100%';
}

function closeModal() { document.getElementById('img-modal').classList.remove('show'); pendingImageData = null; }

function confirmImage() {
  if (!pendingImageData) return;
  const size = parseInt(document.getElementById('adj-size').value);
  const pos = parseInt(document.getElementById('adj-pos').value);
  if (!data.uploads) data.uploads = [];
  data.uploads.unshift({ data: pendingImageData, size, pos });
  if (data.uploads.length > 3) data.uploads = data.uploads.slice(0, 3);
  data.settings.size = size; data.settings.pos = pos;
  setBg(pendingImageData, 'image');
  closeModal();
}

document.getElementById('reflection').oninput = (e) => { localStorage.setItem('refl_' + getDStr(current), e.target.value); };
render();
</script>
</body>
</html>
