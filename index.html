<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyToDo">
<link rel="apple-touch-icon" href="icon.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ToDo App</title>
<style>
:root { 
  --section-opacity: 0.95; 
  --accent-color: #4a90e2; 
  --app-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --bg-blur: 0px;
}

/* 全体リセット */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { font-family: var(--app-font); background: #000; color: #1a1a1a; transition: font-family 0.3s; min-height: 100vh; min-height: 100dvh; }

/* 背景レイヤー */
#bg-layer { position: fixed; inset: -20px; background: linear-gradient(135deg,#fde8f0,#fbc8d8); background-size: cover; background-position: center; z-index: -1; transition: background 0.3s, filter 0.3s; filter: blur(var(--bg-blur)); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); z-index: 0; pointer-events: none; }

/* メインコンテナ */
.app-container { 
  position: relative; z-index: 1; max-width: 500px; margin: 0 auto; 
  padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 80px);
  display: flex; flex-direction: column; gap: 10px;
}

/* カード共通 */
.card { 
  background: rgba(255,255,255, var(--section-opacity)); backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
  border-radius: 18px; border: 1px solid rgba(255,255,255,0.4); transition: background 0.3s;
  overflow: hidden; /* はみ出し防止 */
}

/* ヘッダー：3カラム構成でストリークを右端に固定 */
.header { 
  padding: 8px 15px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

.header-left { width: 44px; display: flex; align-items: center; }
.header-right { width: auto; min-width: 44px; display: flex; align-items: center; justify-content: flex-end; }

.header-btn { border: none; background: none; font-size: 24px; cursor: pointer; color: #333; padding: 5px 0; }

/* ストリークバッジ：楕円背景を削除、枠内に収める */
#streak-badge { 
  font-size: 13px; 
  font-weight: 800; 
  color: #555; 
  display: flex; 
  align-items: center; 
  gap: 3px; 
  white-space: nowrap; /* 改行禁止 */
}

/* 中央の日付ナビゲーション */
.date-nav-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.date-nav-btn { background: none; border: none; font-size: 18px; padding: 10px; color: #555; cursor: pointer; transition: 0.2s; }
.date-nav-btn:active { transform: scale(0.8); }
.date-wrap { position: relative; }
.date-label { font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; background: rgba(0,0,0,0.04); padding: 7px 14px; border-radius: 20px; white-space: nowrap; }
#date-picker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

/* タスクリスト関連 */
.card-title { font-size: 11px; font-weight: 800; color: #666; padding: 12px 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
.task-item { display: flex; align-items: center; gap: 8px; padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
.cb { width: 22px; height: 22px; accent-color: var(--accent-color); transition: 0.3s; flex-shrink: 0; }
.task-content { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; }
.task-text { font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-text.done { text-decoration: line-through; color: #aaa; }
.due-badge { font-size: 10px; font-weight: bold; color: #fff; background: #ff6b6b; padding: 3px 6px; border-radius: 6px; white-space: nowrap; }
.edit-btn { background: none; border: none; color: #999; font-size: 16px; padding: 5px; cursor: pointer; }
.del-btn { background: none; border: none; color: #ccc; font-size: 20px; padding: 5px; cursor: pointer; }

/* 追加エリア */
.add-area { display: flex; gap: 6px; padding: 10px 12px; align-items: center; }
.add-area input[type="text"] { flex: 1; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; min-width: 0; }
.date-input-wrap { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 0 5px 0 8px; height: 38px;}
.date-icon { font-size: 11px; font-weight: bold; color: #777; }
.add-area input[type="date"] { background: transparent; border: none; font-size: 12px; outline: none; color: #555; width: 100px; }
.add-area button { background: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 0 12px; height: 38px; font-weight: 700; cursor: pointer; font-size: 13px; }

/* メモ */
.reflection-box { width: calc(100% - 30px); height: 80px; background: rgba(255,255,255,0.3); border: none; border-radius: 12px; padding: 10px; font-size: 14px; margin: 8px 15px 15px; outline: none; resize: none; font-family: inherit; }

/* 設定 */
.settings-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 800; font-size: 14px; color: #555; }
.settings-grid { padding: 0 15px 15px 15px; display: grid; gap: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
.label { font-size: 11px; font-weight: 800; color: #777; margin-bottom: 8px; display: block; }
.color-list { display: flex; flex-wrap: wrap; gap: 10px; }
.swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; position: relative; transition: 0.2s; }
.swatch.active { border-color: var(--accent-color); transform: scale(1.1); }
.op-btn-group { display: flex; gap: 10px; }
.op-btn { flex: 1; height: 40px; border-radius: 10px; border: none; background: rgba(0,0,0,0.05); font-weight: 700; font-size: 13px; color: #444; cursor: pointer; }
.op-btn.active { background: var(--accent-color); color: white; }

/* トースト */
#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--accent-color); color: #fff; padding: 12px 24px; border-radius: 25px; font-size: 14px; font-weight: 800; opacity: 0; transition: 0.3s; z-index: 5000; pointer-events: none; }
#toast.show { opacity: 1; bottom: 120px; }

/* モーダル */
#archive-modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
#archive-modal.show { display: flex !important; }
.archive-card { background: #fff; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
.archive-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
.flt-btn { flex: 1; padding: 8px; border-radius: 10px; border: none; background: rgba(0,0,0,0.05); font-weight: 700; font-size: 12px; cursor: pointer; }
.flt-btn.active { background: var(--accent-color); color: #fff; }
#archive-list { overflow-y: auto; flex: 1; padding-bottom: 20px; }

#img-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: #000; align-items: center; justify-content: center; }
#img-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; touch-action: none; }
.modal-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit;}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div class="overlay"></div>

<div class="app-container">
  <div class="card header">
    <div class="header-left">
      <button class="header-btn" onclick="openArchive()">≡</button>
    </div>
    
    <div class="date-nav-container">
      <button class="date-nav-btn" onclick="moveDate(-1)">◀︎</button>
      <div class="date-wrap">
        <div class="date-label" id="date-label">日付</div>
        <input type="date" id="date-picker" onchange="jumpDate(this.value)">
      </div>
      <button class="date-nav-btn" onclick="moveDate(1)">▶︎</button>
    </div>

    <div class="header-right">
      <div id="streak-badge">🔥 <span id="streak-count">0</span>日</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日やること</div>
    <div id="list-today"></div>
    <div class="add-area">
      <input type="text" id="input-today" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('today')">
      <div class="date-input-wrap">
        <span class="date-icon">期限:</span>
        <input type="date" id="due-today">
      </div>
      <button onclick="addTask('today')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今週やること</div>
    <div id="list-weekly"></div>
    <div class="add-area">
      <input type="text" id="input-weekly" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')addTask('weekly')">
      <div class="date-input-wrap">
        <span class="date-icon">期限:</span>
        <input type="date" id="due-weekly">
      </div>
      <button onclick="addTask('weekly')">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">今日のメモ</div>
    <textarea id="reflection" class="reflection-box" placeholder="今日はどんな一日だった？"></textarea>
  </div>

  <div class="card">
    <div class="settings-header" onclick="toggleSettings()">
      <span>⚙️ 詳細設定</span>
      <span id="settings-chevron">▼</span>
    </div>
    <div class="settings-grid" id="settings-content" style="display: none;">
      <div>
        <span class="label">背景を選ぶ</span>
        <div class="color-list" id="swatch-list"></div>
        <div class="color-list" id="history-list" style="margin-top:10px;"></div>
      </div>
      <div>
        <span class="label">背景のぼかし</span>
        <div class="op-btn-group">
          <button id="blur-none" class="op-btn" onclick="setBlur('0px')">なし</button>
          <button id="blur-mid" class="op-btn" onclick="setBlur('5px')">弱</button>
          <button id="blur-high" class="op-btn" onclick="setBlur('15px')">強</button>
        </div>
      </div>
      <div>
        <span class="label">透明度</span>
        <div class="op-btn-group">
          <button id="op-high" class="op-btn" onclick="setOp(0.3)">高</button>
          <button id="op-mid" class="op-btn" onclick="setOp(0.6)">中</button>
          <button id="op-low" class="op-btn" onclick="setOp(0.95)">低</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="archive-modal">
  <div class="archive-card">
    <div class="archive-header">
      <h3 style="font-size:16px;">過去の完了タスク</h3>
      <button class="header-btn" onclick="closeArchive()">×</button>
    </div>
    <div style="display:flex; gap:10px; padding:15px; background:#fafafa;">
      <button id="flt-day" class="flt-btn active" onclick="setArchFilter('day')">今日</button>
      <button id="flt-week" class="flt-btn" onclick="setArchFilter('week')">7日間</button>
      <button id="flt-month" class="flt-btn" onclick="setArchFilter('month')">今月</button>
    </div>
    <div id="archive-list"></div>
  </div>
</div>

<div id="img-modal">
  <canvas id="img-canvas"></canvas>
  <div style="position:absolute; bottom:50px; width:90%; display:flex; gap:15px; left:5%; z-index:10;">
    <button class="modal-btn" style="background:rgba(255,255,255,0.2);color:#fff;" onclick="closeModal()">戻る</button>
    <button class="modal-btn" style="background:var(--accent-color);color:#fff" onclick="confirmImage()">背景に設定</button>
  </div>
</div>

<script>
let current = new Date();
const storageKey = 'todo_app_permanent_data'; 
const presets = [
  { bg: 'linear-gradient(135deg,#fde8f0,#fbc8d8)', color: '#ec4899' }, 
  { bg: 'linear-gradient(135deg,#fef9c3,#fde68a)', color: '#eab308' }, 
  { bg: 'linear-gradient(135deg,#d1fae5,#a7f3d0)', color: '#10b981' }, 
  { bg: 'linear-gradient(135deg,#dbeafe,#bfdbfe)', color: '#3b82f6' }, 
  { bg: 'linear-gradient(135deg,#ede9fe,#ddd6fe)', color: '#8b5cf6' }
];

let data = JSON.parse(localStorage.getItem(storageKey)) || { tasks: [], uploads: [], settings: {} };
if(!data.settings.bg) data.settings = { bg: presets[0].bg, bgType: 'css', themeColor: presets[0].color, op: 0.95, blur: '0px', font: '-apple-system' };

function save() { localStorage.setItem(storageKey, JSON.stringify(data)); }
function getDStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function calcStreak() {
  let count = 0;
  let tempD = new Date();
  let todayStr = getDStr(tempD);
  tempD.setDate(tempD.getDate() - 1);
  let yesterdayStr = getDStr(tempD);

  let doneDates = new Set();
  data.tasks.forEach(t => { if(t.completedAt) doneDates.add(t.completedAt.split('T')[0]); });

  let currentCheck = todayStr;
  if (doneDates.has(todayStr)) { count++; currentCheck = yesterdayStr; } 
  else if (doneDates.has(yesterdayStr)) { currentCheck = yesterdayStr; } 
  else { document.getElementById('streak-count').textContent = "0"; return; }

  while(true) {
    if (currentCheck !== todayStr && doneDates.has(currentCheck)) { count++; } 
    else if (currentCheck !== todayStr) { break; }
    let prev = new Date(currentCheck.replace(/-/g, '/'));
    prev.setDate(prev.getDate() - 1);
    currentCheck = getDStr(prev);
    if(count > 365) break; // 安全策
  }
  document.getElementById('streak-count').textContent = count;
}

function render() {
  const dStr = getDStr(current);
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent = `${current.getFullYear()}年${current.getMonth()+1}月${current.getDate()}日(${days[current.getDay()]})`;

  ['today', 'weekly'].forEach(type => {
    const listEl = document.getElementById('list-' + type);
    listEl.innerHTML = '';
    const visible = data.tasks.filter(t => {
      if (t.type !== type) return false;
      if (t.completedAt && t.completedAt.split('T')[0] !== dStr) return false;
      return dStr >= t.createdAt;
    });

    visible.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-item';
      const isDone = !!t.completedAt;
      div.innerHTML = `
        <input type="checkbox" class="cb" ${isDone ? 'checked' : ''}>
        <div class="task-content">
          <span class="task-text ${isDone ? 'done' : ''}">${t.text}</span>
          ${t.dueDate ? `<span class="due-badge">期限: ${t.dueDate.slice(5).replace('-','/')}</span>` : ''}
        </div>
        <button class="edit-btn">✎</button>
        <button class="del-btn">×</button>
      `;
      div.querySelector('.cb').onchange = (e) => {
        t.completedAt = e.target.checked ? dStr : null;
        if(e.target.checked) showToast();
        save(); render();
      };
      div.querySelector('.edit-btn').onclick = () => {
        const nt = prompt("編集", t.text);
        if(nt) { t.text = nt; save(); render(); }
      };
      div.querySelector('.del-btn').onclick = () => {
        data.tasks = data.tasks.filter(x => x !== t);
        save(); render();
      };
      listEl.appendChild(div);
    });
  });
  document.getElementById('reflection').value = localStorage.getItem('refl_' + dStr) || '';
  applySettings();
  buildSwatches();
  calcStreak();
}

function showToast() {
  const t = document.getElementById('toast');
  t.textContent = ["ナイス！", "お疲れ様！", "その調子！"][Math.floor(Math.random()*3)];
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function moveDate(n) { current.setDate(current.getDate() + n); render(); }
function jumpDate(v) { if(v) current = new Date(v.replace(/-/g, '/')); render(); }
function addTask(type) {
  const inp = document.getElementById('input-' + type);
  const due = document.getElementById('due-' + type);
  if(!inp.value.trim()) return;
  data.tasks.push({ text: inp.value.trim(), type: type, createdAt: getDStr(current), completedAt: null, dueDate: due.value || null });
  inp.value = ''; due.value = ''; save(); render();
}

function toggleSettings() {
  const c = document.getElementById('settings-content');
  c.style.display = c.style.display === 'none' ? 'grid' : 'none';
  document.getElementById('settings-chevron').textContent = c.style.display === 'none' ? '▼' : '▲';
}

function applySettings() {
  const s = data.settings;
  const bg = document.getElementById('bg-layer');
  if(s.bgType === 'image') bg.style.backgroundImage = `url(${s.bg})`;
  else bg.style.background = s.bg;
  document.documentElement.style.setProperty('--accent-color', s.themeColor || '#4a90e2');
  document.documentElement.style.setProperty('--section-opacity', s.op);
  document.documentElement.style.setProperty('--bg-blur', s.blur);
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
}

function setOp(v) { data.settings.op = v; save(); render(); }
function setBlur(v) { data.settings.blur = v; save(); render(); }
function setBg(bg, type, color) { data.settings.bg = bg; data.settings.bgType = type; data.settings.themeColor = color; save(); render(); }

function buildSwatches() {
  const list = document.getElementById('swatch-list'); list.innerHTML = '';
  presets.forEach(p => {
    const d = document.createElement('div');
    d.className = 'swatch' + (data.settings.bg === p.bg ? ' active' : '');
    d.style.background = p.bg; d.onclick = () => setBg(p.bg, 'css', p.color);
    list.appendChild(d);
  });
}

function openArchive() { document.getElementById('archive-modal').classList.add('show'); renderArchive(); }
function closeArchive() { document.getElementById('archive-modal').classList.remove('show'); }
let currentArchFilter = 'day';
function setArchFilter(f) { currentArchFilter = f; document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active')); document.getElementById('flt-'+f).classList.add('active'); renderArchive(); }

function renderArchive() {
  const list = document.getElementById('archive-list'); list.innerHTML = '';
  let filtered = data.tasks.filter(t => t.completedAt);
  if(currentArchFilter === 'day') filtered = filtered.filter(t => t.completedAt === getDStr(new Date()));
  filtered.forEach(t => {
    const div = document.createElement('div'); div.className = 'task-item';
    div.innerHTML = `<input type="checkbox" checked disabled><span class="task-text done" style="flex:1">${t.text}</span><span style="font-size:10px;color:#999">${t.completedAt}</span>`;
    list.appendChild(div);
  });
}

// 画像アップロード・編集関連は必要に応じて追加可能
document.getElementById('reflection').oninput = (e) => localStorage.setItem('refl_' + getDStr(current), e.target.value);
render();
</script>
</body>
</html>
